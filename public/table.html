<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Makanan</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between mb-3">
        <h3>Daftar Menu</h3>
        <a href="/" class="btn btn-primary">+ Tambah Baru</a>
    </div>
    <div class="card shadow"><div class="card-body">
        <table id="tableData" class="table table-striped table-bordered w-100">
            <thead>
                <tr>
                    <th>ID</th><th>Nama</th><th>Jenis</th><th>Harga</th><th>Aksi</th>
                </tr>
            </thead>
        </table>
    </div></div>
</div>

<div class="modal fade" id="modalEdit" tabindex="-1">
    <div class="modal-dialog">
        <form id="formEdit" class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Edit Menu</h5></div>
            <div class="modal-body">
                <input type="hidden" id="edit_id">
                <div class="mb-3"><label>Nama</label><input type="text" id="edit_nama" class="form-control" required></div>
                <div class="mb-3"><label>Jenis</label><select id="edit_jenis" class="form-select"><option value="Makanan">Makanan</option><option value="Minuman">Minuman</option></select></div>
                <div class="mb-3"><label>Harga</label><input type="number" id="edit_harga" class="form-control" required></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                <button type="submit" class="btn btn-success">Update</button>
            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script>
$(document).ready(function () {
    let table = $('#tableData').DataTable({
        ajax: { url: '/data', dataSrc: '' },
        columns: [
            { data: 'id' }, { data: 'nama' }, { data: 'jenis' },
            { data: 'harga', render: $.fn.dataTable.render.number('.', ',', 0, 'Rp ') },
            { data: null, render: function(data) {
                return `<button class="btn btn-warning btn-sm" onclick='openEdit(${JSON.stringify(data)})'>Edit</button> 
                        <button class="btn btn-danger btn-sm" onclick="hapus(${data.id})">Hapus</button>`;
            }}
        ]
    });

    window.openEdit = (data) => {
        $('#edit_id').val(data.id); $('#edit_nama').val(data.nama);
        $('#edit_jenis').val(data.jenis); $('#edit_harga').val(data.harga);
        $('#modalEdit').modal('show');
    };

    $('#formEdit').submit(function(e){
        e.preventDefault();
        const id = $('#edit_id').val();
        $.ajax({
            url: '/update/'+id, type: 'PUT', contentType: 'application/json',
            data: JSON.stringify({ nama: $('#edit_nama').val(), jenis: $('#edit_jenis').val(), harga: $('#edit_harga').val() }),
            success: (res) => { alert(res); $('#modalEdit').modal('hide'); table.ajax.reload(); }
        });
    });

    window.hapus = (id) => {
        if(confirm("Hapus data?")) $.ajax({ url: '/delete/'+id, type: 'DELETE', success: (res) => { alert(res); table.ajax.reload(); } });
    };
});
</script>
</body>
</html>
